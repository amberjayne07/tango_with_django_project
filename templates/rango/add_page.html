{% extends 'rango/base.html' %}

{% block title_block %}
Add a Page
{% endblock %}

{% block body_block %}
<h1>Add a Page</h1>

<form method="post" action="{% url 'rango:add_page' category.slug %}">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="submit" value="Create Page">
</form>

{% endblock %}
